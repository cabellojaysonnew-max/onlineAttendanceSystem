
<div class="card">

<h2>Notifications</h2>

<div id="notif"></div>

</div>

<script type="module">

import { supabaseClient } from "../js/supabase.js"

const {data}=await supabaseClient
.from("notifications")
.select("*")
.order("created_at",{ascending:false})
.limit(20)

let html=""

;(data||[]).forEach(n=>{

html+=`<div class="row">${n.message}</div>`

})

document.getElementById("notif").innerHTML=html

</script>
