
<div class="card">

<h2>New Travel Order Application</h2>

<label>Destination</label>
<input id="dest">

<label>Purpose</label>
<input id="purpose">

<label>Start Date</label>
<input type="date" id="start">

<label>End Date</label>
<input type="date" id="end">

<button onclick="submitTO()" class="btn-main">Submit Official Request</button>

</div>

<script type="module">

import { supabaseClient } from "../js/supabase.js"

window.submitTO = async function(){

const emp_id=localStorage.getItem("emp_id")

const dest=document.getElementById("dest").value
const purp=document.getElementById("purpose").value
const start=document.getElementById("start").value
const end=document.getElementById("end").value

await supabaseClient
.from("travel_orders")
.insert([
{
emp_id:emp_id,
destination:dest,
purpose:purp,
start_date:start,
end_date:end,
status:"PENDING"
}
])

alert("Travel Order Submitted")

}

</script>
