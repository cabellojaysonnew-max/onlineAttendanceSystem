<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>DAR Field Attendance</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loginView" class="container">
  <img src="dar_logo.png" class="logo">
  <h1>DAR Field Attendance</h1>
  <input id="empId" placeholder="Employee ID">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="dashboard" class="container hidden">
  <h2 id="userName"></h2>
  <div id="location">Detecting location...</div>
  <button onclick="clock('IN')">Clock In</button>
  <button onclick="clock('OUT')">Clock Out</button>
  <h3>Today's Logs</h3>
  <ul id="logs"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
